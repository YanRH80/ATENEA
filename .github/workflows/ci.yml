name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        env:
          ATENEA_DATA_DIR: /tmp/atenea-test-data
        run: |
          python -m pytest tests/ -v --tb=short --cov=atenea --cov-report=term-missing

      - name: Check syntax of all modules
        run: |
          python -c "
          import ast, pathlib
          errors = []
          for f in pathlib.Path('atenea').rglob('*.py'):
              try:
                  ast.parse(f.read_text())
              except SyntaxError as e:
                  errors.append(f'{f}: {e}')
          if errors:
              print('\n'.join(errors))
              exit(1)
          print('All modules OK')
          "
