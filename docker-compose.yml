services:
  atenea:
    build: .
    volumes:
      - atenea-data:/data
    environment:
      - ATENEA_DATA_DIR=/data
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    entrypoint: ["atenea"]
    command: ["doctor"]

  atenea-ui:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - atenea-data:/data
    environment:
      - ATENEA_DATA_DIR=/data
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    entrypoint: ["atenea"]
    command: ["ui", "--port", "8080"]

volumes:
  atenea-data:
